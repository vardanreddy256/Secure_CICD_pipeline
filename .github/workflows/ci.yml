name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Test & Static Analysis
  # ──────────────────────────────────────────────
  test-and-scan:
    name: 🧪 Test & SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run Bandit SAST scan
        run: |
          bandit -r app.py -f json -o bandit-report.json || true
          bandit -r app.py

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────
  # Job 2: Secret Scanning
  # ──────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 3: Build & Vulnerability Scan
  # ──────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test-and-scan, secret-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t secure-python-app:latest .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-python-app:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: json
          output: trivy-report.json

      - name: Evaluate Trivy results
        run: |
          CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
          HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
          echo "Found $CRITICAL_COUNT CRITICAL and $HIGH_COUNT HIGH vulnerabilities."
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Pipeline blocked: CRITICAL vulnerabilities detected."
            exit 1
          else
            echo "✅ No CRITICAL CVEs found. HIGH findings are noted but non-blocking."
          fi

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag & Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag secure-python-app:latest ${{ secrets.DOCKER_USERNAME }}/secure-python-app:latest
          docker tag secure-python-app:latest ${{ secrets.DOCKER_USERNAME }}/secure-python-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/secure-python-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/secure-python-app:${{ github.sha }}
