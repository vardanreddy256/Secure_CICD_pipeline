version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=${APP_NAME:-Secure Python App}
      - ENV=${ENV:-development}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
